name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ main, master ]

env:
  PROJECT_ID: ssa-alumni
  REGION: asia-south1
  SERVICE_NAME: ssa-alumni-dev
  IMAGE_NAME: asia-south1-docker.pkg.dev/ssa-alumni/ssa-alumni/backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        # These will be provided after the infrastructure apply is complete
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Build and Push Docker Image
      run: |
        gcloud builds submit . \
          --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --tag ${{ env.IMAGE_NAME }}:latest \
          --project ${{ env.PROJECT_ID }}

    - name: Deploy to Cloud Run
      run: |
        gcloud run services update ${{ env.SERVICE_NAME }} \
          --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --project ${{ env.PROJECT_ID }}

    - name: Run Migrations (Cloud Run Job)
      run: |
        gcloud run jobs update ${{ env.SERVICE_NAME }}-migrate \
          --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --project ${{ env.PROJECT_ID }}
        gcloud run jobs execute ${{ env.SERVICE_NAME }}-migrate \
          --region ${{ env.REGION }} \
          --project ${{ env.PROJECT_ID }} \
          --wait
